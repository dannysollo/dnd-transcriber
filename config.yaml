  "Sephiroth": "Sephirot"
  "Netsak": "Netzach"
  "Netzak": "Netzach"
  "Hakma": "Hokma"
  "Piferet": "Tiferet"
  "Kesed": "Chesed"
  "Bina": "Binah"
  "Da'at": "Da'at"
  # NPCs
  "Murr": "Mer"
  "Myr": "Mer"
  "Vikrenth": "Vikranth"
  "Aya": "Aja"
  # Locations
  "Neftalia": "Naphtaalia"
  "Kulth": "Kolth"
  "Kanaan": "Canaan"
  "Azaya": "Aziah"
  # PCs (kept as fallback)
