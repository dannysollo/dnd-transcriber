  - {match: "(?i)\\bMingo\\b",         replace: "Mango"}
  - {match: "(?i)\\bVix\\s+Ps[yi]\\b", replace: "Vix Psi"}
  - {match: "(?i)\\bVic\\s+Stine\\b",  replace: "Vix Psi"}
  - {match: "(?i)\\bTae[-\\s]?[Hh]ome\\b",  replace: "Tehom"}
  - {match: "(?i)\\bTaehome\\b",       replace: "Tehom"}
  - {match: "(?i)\\bTeihome\\b",       replace: "Tehom"}
  - {match: "(?i)\\bTake[-\\s]?home\\b", replace: "Tehom"}
  - {match: "(?i)\\bTayholm\\b",       replace: "Tehom"}
  - {match: "(?i)\\bTayhome\\b",        replace: "Tehom"}
  - {match: "(?i)\\bTay\\s+[Hh]ome\\b", replace: "Tehom"}
  - {match: "(?i)\\bTae-?[Hh]ong\\b",  replace: "Tehom"}
  - {match: "(?i)\\bVitaeholm\\b",      replace: "Tehom"}
  - {match: "(?i)\\bTee\\s+[Hh]ome\\b", replace: "Tehom"}
