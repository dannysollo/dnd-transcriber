  - {match: "\\bnetzach\\b",    replace: "Netzach"}
  - {match: "\\bchesed\\b",     replace: "Chesed"}
  - {match: "\\bazrael\\b",     replace: "Azrael"}
  - {match: "\\baziah\\b",      replace: "Aziah"}
  - {match: "\\bcanaan\\b",     replace: "Canaan"}
  - {match: "\\bketer\\b",      replace: "Keter"}
  - {match: "\\bereshkigal\\b", replace: "Ereshkigal"}
  - {match: "\\bbethsaida\\b",  replace: "Bethsaida"}
  - {match: "\\bvikranth\\b",   replace: "Vikranth"}
  - {match: "\\bmer\\b",        replace: "Mer"}
  - {match: "(?i)\\bCollie\\b", replace: "Kali"}
  - {match: "(?i)\\bHolly\\b",  replace: "Kali"}
  - {match: "(?i)\\bAkali\\b",  replace: "Kali"}
  - {match: "(?i)\\btolly\\b",  replace: "Kali"}
  - {match: "(?i)\\bbroach\\b", replace: "brooch"}
