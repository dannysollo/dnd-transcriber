## DnD Transcriber Config

vault_path: "../campaign-vault"
sessions_dir: "sessions"
whisper_model: "turbo"  # large-v3 recommended for 4060 Ti; "turbo" is faster but less accurate
vad: true               # Voice Activity Detection — zeros out silence before Whisper to prevent hallucinations

## Discord username → character/player info
## Keys must match a fragment of the Craig audio filename (Craig uses Discord usernames)
players:
  dannysollo:
    name: "Danny"
    character: null
    role: dm
  thatscinerd:
    name: "Juno"
    character: null
    role: dm
  masteriouss:
    name: "Marko"
    character: "Kali"
    role: player
  noxnyx:
    name: "Christina"
    character: "Aella"
    role: player
  milksteaki:
    name: "Sue"
    character: "Vixeena"
    role: player
  shiny_milotic:
    name: "Mihir"
    character: "Belle"
    role: player

## Anthropic API key — leave as-is to read from environment variable ANTHROPIC_API_KEY
## Or paste directly: anthropic_api_key: "sk-ant-..."
anthropic_api_key: "${ANTHROPIC_API_KEY}"

## Set to true to automatically ping Claude via OpenClaw when transcription is done.
## Claude will read the transcript from the workspace and post analysis to Discord.
notify_claude: true
openclaw_session_id: "agent:main:discord:direct:235848101569626122"

## Regex patterns: context-aware replacements run before simple corrections.
## Use these for words that are also real English words (Greek letters, etc.)
## 'match' is a Python regex, 'replace' is the replacement string.
patterns:
  # Greek letters in "Chamber X" context
  - {match: "(?i)\\bChamber\\s+Row\\b",    replace: "Chamber Rho"}
  - {match: "(?i)\\bChamber\\s+Fie\\b",    replace: "Chamber Phi"}
  - {match: "(?i)\\bChamber\\s+Fi\\b",     replace: "Chamber Phi"}
  - {match: "(?i)\\bChamber\\s+Sigh\\b",   replace: "Chamber Psi"}
  - {match: "(?i)\\bChamber\\s+Sai\\b",    replace: "Chamber Psi"}
  - {match: "(?i)\\bChamber\\s+Sy\\b",     replace: "Chamber Psi"}
  - {match: "(?i)\\bChamber\\s+Mew\\b",    replace: "Chamber Mu"}
  - {match: "(?i)\\bChamber\\s+Zi\\b",     replace: "Chamber Xi"}
  - {match: "(?i)\\bChamber\\s+Zee\\b",    replace: "Chamber Xi"}
  - {match: "(?i)\\bRow\\s+Chamber\\b",    replace: "Rho Chamber"}
  - {match: "(?i)\\bFie\\s+Chamber\\b",    replace: "Phi Chamber"}
  - {match: "(?i)\\bFi\\s+Chamber\\b",     replace: "Phi Chamber"}
  - {match: "(?i)\\bSigh\\s+Chamber\\b",   replace: "Psi Chamber"}
  - {match: "(?i)\\bMew\\s+Chamber\\b",    replace: "Mu Chamber"}
  - {match: "(?i)\\bZi\\s+Chamber\\b",     replace: "Xi Chamber"}
  # Tehom multi-word mishearings
  - {match: "(?i)\\bTae\\s+[Hh]ome\\b", replace: "Tehom"}
  - {match: "(?i)\\bthe\\s+[Hh]ome\\b", replace: "Tehom"}
  # Lowercase proper nouns (turbo model issue)
  - {match: "\\bglimmer\\b",    replace: "Glimmer"}
  - {match: "\\bjudah\\b",      replace: "Judah"}
  - {match: "\\bjunia\\b",      replace: "Junia"}
  - {match: "\\bsinclair\\b",   replace: "Sinclair"}
  - {match: "\\bmalkuth\\b",    replace: "Malkuth"}
  - {match: "\\bsephirot\\b",   replace: "Sephirot"}
  - {match: "\\bfensworth\\b",  replace: "Fensworth"}
  - {match: "\\bnic[oa]\\b",    replace: "Nico"}
  - {match: "\\brotor\\b",      replace: "Rotor"}
  - {match: "\\btehom\\b",      replace: "Tehom"}
  - {match: "\\bbinah\\b",      replace: "Binah"}
  - {match: "\\bhokma\\b",      replace: "Hokma"}
