## DnD Transcriber Config

vault_path: "../campaign-vault"
sessions_dir: "sessions"
whisper_model: "large-v3"  # large-v3 recommended for 4060 Ti; "turbo" is faster but less accurate

## Discord username → character/player info
## Keys must match a fragment of the Craig audio filename (Craig uses Discord usernames)
players:
  dannysollo:
    name: "Danny"
    character: null
    role: dm
  thatscinerd:
    name: "Juno"
    character: null
    role: dm
  masteriouss:
    name: "Kali"
    character: "Kali"
    role: player
  noxnyx:
    name: "Aella"
    character: "Aella"
    role: player
  milksteaki:
    name: "Vixeena"
    character: "Vixeena"
    role: player
  shiny_milotic:
    name: "Belle"
    character: "Belle"
    role: player

## Anthropic API key — leave as-is to read from environment variable ANTHROPIC_API_KEY
## Or paste directly: anthropic_api_key: "sk-ant-..."
anthropic_api_key: "${ANTHROPIC_API_KEY}"

## Set to true to automatically ping Claude via OpenClaw when transcription is done.
## Claude will read the transcript from the workspace and post analysis to Discord.
notify_claude: true

## Post-processing corrections: applied to transcript after Whisper transcription.
## Whole-word matching (won't replace partial words). Add more as you discover errors.
corrections:
  # Sephirot names
  "Sephiroth": "Sephirot"
  "Netsak": "Netzach"
  "Netzak": "Netzach"
  "Hakma": "Hokma"
  "Piferet": "Tiferet"
  "Kesed": "Chesed"
  "Bina": "Binah"
  "Da'at": "Da'at"
  # Greek letters (Whisper always mishears these)
  "Chamber Row": "Chamber Rho"
  "chamber row": "Chamber Rho"
  # NPCs
  "Murr": "Mer"
  "Myr": "Mer"
  "Vikrenth": "Vikranth"
  "Aya": "Aja"
  # Locations
  "Neftalia": "Naphtaalia"
  "Kulth": "Kolth"
  "Kanaan": "Canaan"
  "Azaya": "Aziah"
  # PCs (kept as fallback)
  "Ayla": "Aella"
  "Vixena": "Vixeena"
  "Dot": "Da'at"
